<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wigwam Analytics Generator</title>
  <style>
    :root {
      --ink: #141b18;
      --muted: #68736f;
      --line: #dde3df;
      --paper: #f4f6f2;
      --panel: #ffffff;
      --accent: #1f563d;
      --accent-dark: #143b2b;
      --accent-2: #c8462c;
      --soft: #edf3ec;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #ffffff 0%, #f7f8f4 38%, var(--paper) 100%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(12px);
    }

    .topbar::before {
      content: "";
      display: block;
      height: 5px;
      background: var(--accent-2);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      width: min(1060px, calc(100vw - 32px));
      margin: 0 auto;
      min-height: 76px;
    }

    .logo {
      display: block;
      width: 178px;
      max-width: 44vw;
      height: auto;
    }

    .shell {
      width: min(980px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 44px 0 64px;
    }

    .intro {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 28px;
      margin-bottom: 24px;
      padding: 22px 0 8px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent-2);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: 38px;
      line-height: 1.12;
      font-weight: 820;
      letter-spacing: 0;
    }

    .status-card {
      min-width: 190px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      background: var(--soft);
    }

    .status-card span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .status-card b {
      color: var(--accent-dark);
      font-size: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(20, 27, 24, .10);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .form-section {
      padding-bottom: 24px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    .form-section:last-of-type {
      margin-bottom: 18px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .note {
      margin: -6px 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    label {
      display: block;
      margin-bottom: 18px;
    }

    label span {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid #c5cec7;
      border-radius: 6px;
      padding: 11px 13px;
      color: var(--ink);
      background: #fff;
      font: inherit;
    }

    input:focus {
      outline: 3px solid rgba(31, 86, 61, .14);
      border-color: var(--accent);
    }

    input[type=file] {
      padding: 11px 12px;
      background: #fbfcfa;
    }

    .file-input::file-selector-button {
      margin-right: 14px;
      border: 0;
      border-radius: 5px;
      padding: 8px 12px;
      color: #fff;
      background: var(--accent-dark);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border: 0;
      border-radius: 6px;
      padding: 0 22px;
      color: #fff;
      background: var(--accent-dark);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(20, 59, 43, .18);
    }

    button:hover {
      background: var(--accent);
    }

    .loading {
      display: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    form.is-submitting .loading {
      display: inline;
    }

    form.is-submitting button {
      opacity: .72;
      cursor: wait;
    }

    @media (max-width: 720px) {
      .shell {
        padding: 32px 0;
      }

      .intro {
        display: block;
      }

      .status-card {
        margin-top: 18px;
      }

      h1 {
        font-size: 28px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .actions {
        display: grid;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <img class="logo" src="/gobros-logo.avif" alt="GoBros" />
    </div>
  </header>

  <main class="shell">
    <section class="intro">
      <div>
        <p class="eyebrow">Wigwam Analytics Generator</p>
        <h1>Generate the Wigwam sales report from the monthly exports.</h1>
      </div>
      <div class="status-card">
        <span>Template</span>
        <b>Wigwam catalog</b>
      </div>
    </section>

    <form action="/api/generate" method="post" enctype="multipart/form-data" class="panel" id="report-form">
      <section class="form-section">
        <h2>Report Details</h2>
        <div class="grid">
          <label>
            <span>Dealer name</span>
            <input name="dealer_name" value="GoBros" />
          </label>
          <label>
            <span>Month ending</span>
            <input name="month_ending" type="date" required />
          </label>
        </div>
      </section>

      <section class="form-section">
        <h2>Source Files</h2>
        <p class="note">The app uses the Wigwam template catalog and refreshes it from the monthly Amazon exports.</p>
        <label>
          <span>Business Report</span>
          <input class="file-input" name="business_report" type="file" accept=".csv,.txt" required />
        </label>
        <label>
          <span>FBM Inventory+Report</span>
          <input class="file-input" name="inventory_report" type="file" accept=".txt,.csv" required />
        </label>
        <label>
          <span>FBA Inventory</span>
          <input class="file-input" name="fba_inventory_report" type="file" accept=".txt,.csv" required />
        </label>
        <label>
          <span>GB Sales CSV</span>
          <input class="file-input" name="gobros_sales" type="file" accept=".csv,.txt" />
        </label>
      </section>

      <div class="actions">
        <span class="loading">Generating workbook...</span>
        <button type="submit">Generate workbook</button>
      </div>
    </form>
  </main>

  <script>
    const form = document.getElementById("report-form");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      form.classList.add("is-submitting");
      const button = form.querySelector("button");
      button.disabled = true;
      try {
        const payload = await buildUploadPayload(form);
        const compressed = await gzipPayload(payload);
        const response = await fetch(form.action, {
          method: "POST",
          headers: {
            "Content-Type": "application/octet-stream",
            "X-GoBros-Upload": "gzip-json"
          },
          body: compressed
        });

        if (!response.ok) {
          const message = await response.text();
          throw new Error(message || `Upload failed with status ${response.status}`);
        }

        const blob = await response.blob();
        const disposition = response.headers.get("Content-Disposition") || "";
        const filename = getDownloadFilename(disposition) || "Wigwam-Analytics.xlsx";
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      } catch (error) {
        alert(error instanceof Error ? error.message : "Could not generate workbook.");
      } finally {
        form.classList.remove("is-submitting");
        button.disabled = false;
      }
    });

    async function buildUploadPayload(formElement) {
      const formData = new FormData(formElement);
      const fileFields = ["business_report", "inventory_report", "fba_inventory_report", "gobros_sales"];
      const files = {};
      for (const field of fileFields) {
        const file = formData.get(field);
        if (file instanceof File && file.size > 0) {
          files[field] = {
            filename: file.name,
            content: await file.text()
          };
        }
      }

      return {
        fields: {
          dealer_name: String(formData.get("dealer_name") || ""),
          month_ending: String(formData.get("month_ending") || "")
        },
        files
      };
    }

    async function gzipPayload(payload) {
      if (!("CompressionStream" in window)) {
        throw new Error("This browser cannot compress uploads. Please use the latest Chrome, Edge, or Safari.");
      }
      const json = JSON.stringify(payload);
      const stream = new Blob([json], { type: "application/json" }).stream();
      const compressedStream = stream.pipeThrough(new CompressionStream("gzip"));
      return await new Response(compressedStream).blob();
    }

    function getDownloadFilename(disposition) {
      const match = disposition.match(/filename="([^"]+)"/i);
      return match ? match[1] : "";
    }
  </script>
</body>
</html>
